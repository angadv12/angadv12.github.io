<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Angad Brar</title>
  <link rel="stylesheet" href="styles/index.css">
  <link rel="stylesheet" href="styles/experience.css">
  <link rel="stylesheet" href="styles/projects.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ── 3D Canvas — full-bleed behind hero ──────────────────────── -->
  <div class="hero-scene" id="hero-scene">
    <canvas id="hero-canvas" aria-hidden="true"></canvas>
  </div>

  <div class="container">

    <!-- ── Hero ─────────────────────────────────────────────────── -->
    <div class="bio">
      <img class="bio-photo" src="assets/profile.png" alt="Angad Brar">
      <div class="bio-text">
        <div class="name-position">
          <h1>Angad Brar</h1>
          <p>Software Developer</p>
        </div>
        <div class="contact">
          <a class="contact-icon" href="https://linkedin.com/in/angadbrar-/" aria-label="LinkedIn">
            <i class="bi bi-linkedin"></i>
          </a>
          <a class="contact-icon" href="https://github.com/angadv12/" aria-label="GitHub">
            <i class="bi bi-github"></i>
          </a>
          <a class="contact-icon" href="mailto:angadbrar512@gmail.com" aria-label="Email">
            <i class="bi bi-envelope-at"></i>
          </a>
        </div>
      </div>
    </div>

    <!-- ── About ──────────────────────────────────────────────────── -->
    <section class="about">
      <h2>About</h2>
      <div class="about-body">
        <p class="placeholder">
          <!-- Replace this placeholder with your own bio -->
          Tell your story here — background, interests, what drives you as a developer, goals, etc.
        </p>
      </div>
    </section>

    <!-- ── Experience ─────────────────────────────────────────────── -->
    <div class="experience">
      <h1>Experience</h1>
      <div class="experiences-cards"></div>
    </div>

    <!-- ── Projects ───────────────────────────────────────────────── -->
    <div class="projects">
      <h1>Projects</h1>
      <div class="projects-cards"></div>
    </div>

    <!-- ── Footer ─────────────────────────────────────────────────── -->
    <footer>
      <div>
        <a class="footer-icon" href="https://linkedin.com/in/angadbrar-/" aria-label="LinkedIn">
          <i class="bi bi-linkedin"></i>
        </a>
        <a class="footer-icon" href="https://github.com/angadv12/" aria-label="GitHub">
          <i class="bi bi-github"></i>
        </a>
        <a class="footer-icon" href="mailto:angadbrar512@gmail.com" aria-label="Email">
          <i class="bi bi-envelope-at"></i>
        </a>
      </div>
      <p>Created by Angad Brar &#127918;</p>
    </footer>

  </div>

  <!-- Three.js MUST load before currents.js -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.min.js"></script>
  <script src="currents.js"></script>
  <script src="experience.js"></script>
  <script src="projects.js"></script>

  <div class="cursor-glow">
    <div class="cursor-glow-inner"></div>
  </div>
  <script src="cursor.js"></script>
</body>
</html>
